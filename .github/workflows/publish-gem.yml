# Manual fallback to (re-)publish a gem version to rubygems.org.
# The normal release flow publishes from the `release.yml` workflow's `publish` job.
# Run this manually only if that publish step needs to be retried for an existing release.
# Navigate to the Actions tab -> Publish Gem -> Run workflow.
name: Publish Gem
on:
  workflow_dispatch:

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false
      - run: |-
          bundle install

      - name: Publish to RubyGems.org
        run: |
          bash ./bin/publish-gem
        env:
          # `RUBYGEMS_HOST` is only required for private gem repositories, not https://rubygems.org
          RUBYGEMS_HOST: ${{ secrets.YOOMONEY_RUBYGEMS_HOST || secrets.RUBYGEMS_HOST }}
          GEM_HOST_API_KEY: ${{ secrets.YOOMONEY_GEM_HOST_API_KEY || secrets.GEM_HOST_API_KEY }}
